
<div style="font-size: 40px; padding: 0.5rem 0; max-width: 100%;">
  <h2 class="sr-only">Curva de peso da gravidez interativa</h2>
  
  <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 1.5rem;">
    <div>
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
        <label style="font-size: 40px; font-weight: 500; color: var(--text-primary);">Peso pré-gravidez</label>
        <span style="font-size: 40px; font-weight: 500; color: var(--fill-accent);" id="preWeightValue">64</span>
      </div>
      <input type="range" id="preWeight" value="64" min="40" max="80" step="1" style="width: 100%; height: 40px; cursor: pointer; -webkit-appearance: none; appearance: none; background: transparent;">
      <style>
        input[type="range"] { width: 100%; }
        input[type="range"]::-webkit-slider-track {
          background: var(--surface-1);
          height: 32px;
          border-radius: 16px;
          border: 1px solid var(--border);
        }
        input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          appearance: none;
          width: 40px;
          height: 40px;
          border-radius: 100%;
          background: var(--fill-accent);
          cursor: pointer;
          box-shadow: 0 0 0 10px rgba(57, 135, 229, 0.15);
        }
        input[type="range"]::-moz-range-track {
          background: var(--surface-1);
          height: 20px;
          border-radius: 10px;
          border: 1px solid var(--border);
        }
        input[type="range"]::-moz-range-thumb {
          width: 40px;
          height: 40px;
          border-radius: 100%;
          background: var(--fill-accent);
          cursor: pointer;
          border: none;
          box-shadow: 0 0 0 10px rgba(57, 135, 229, 0.15);
        }
      </style>
    </div>

    <div>
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
        <label style="font-size: 18px; font-weight: 500; color: var(--text-primary);">Altura</label>
        <span style="font-size: 28px; font-weight: 500; color: var(--fill-accent);" id="heightValue">160</span>
      </div>
      <input type="range" id="height" value="160" min="150" max="190" step="1" style="width: 100%; height: 48px; cursor: pointer;">
    </div>

    <div>
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
        <label style="font-size: 18px; font-weight: 500; color: var(--text-primary);">Peso atual</label>
        <span style="font-size: 28px; font-weight: 500; color: var(--fill-accent);" id="currentWeightValue">72</span>
      </div>
      <input type="range" id="currentWeight" value="72" min="40" max="80" step="0.1" style="width: 100%; height: 48px; cursor: pointer;">
    </div>

    <div>
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
        <label style="font-size: 18px; font-weight: 500; color: var(--text-primary);">Semana atual</label>
        <span style="font-size: 28px; font-weight: 500; color: var(--fill-accent);" id="weekValue">20</span>
      </div>
      <input type="range" id="week" value="20" min="0" max="40" step="1" style="width: 100%; height: 48px; cursor: pointer;">
    </div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
    <div style="background: var(--surface-1); border-radius: 12px; padding: 1.5rem;">
      <p style="font-size: 16px; color: var(--text-secondary); margin: 0 0 12px;">IMC pré-gravidez</p>
      <p style="font-size: 36px; font-weight: 500; color: var(--text-primary); margin: 0;" id="bmiDisplay">25.0</p>
      <p style="font-size: 16px; color: var(--text-secondary); margin: 8px 0 0;" id="bmiCategory">Normal</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div style="background: var(--surface-1); border-radius: 12px; padding: 1.5rem;">
        <p style="font-size: 16px; color: var(--text-secondary); margin: 0 0 12px;">Ganho atual</p>
        <p style="font-size: 32px; font-weight: 500; color: var(--text-primary); margin: 0;" id="currentGain">8.0</p>
        <p style="font-size: 16px; color: var(--text-secondary); margin: 8px 0 0;">kg</p>
      </div>
      <div style="background: var(--surface-1); border-radius: 12px; padding: 1.5rem;">
        <p style="font-size: 16px; color: var(--text-secondary); margin: 0 0 12px;">Recomendado</p>
        <p style="font-size: 24px; font-weight: 500; color: var(--text-primary); margin: 0;" id="recommendedGain">11.5-16</p>
        <p style="font-size: 16px; color: var(--text-secondary); margin: 8px 0 0;">kg</p>
      </div>
    </div>
  </div>

  <div style="position: relative; width: 100%; height: 300px; margin-bottom: 1.5rem; background: var(--surface-1); border-radius: 12px; padding: 1rem; box-sizing: border-box;">
    <canvas id="weightChart" role="img" aria-label="Gráfico da curva de peso durante a gravidez" style="max-width: 100%;"></canvas>
  </div>

  <div style="background: var(--surface-1); border-radius: 12px; padding: 1.5rem; font-size: 16px; color: var(--text-secondary);">
    <p style="margin: 0 0 12px; font-weight: 500; color: var(--text-primary); font-size: 18px;">Dicas:</p>
    <p style="margin: 0; line-height: 1.8; font-size: 16px;">Use os sliders para ajustar cada valor. O ganho varia conforme IMC pré-gravidez. Maior ganho ocorre no 2º e 3º trimestres.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const preWeightInput = document.getElementById('preWeight');
const preWeightValue = document.getElementById('preWeightValue');

const heightInput = document.getElementById('height');
const heightValue = document.getElementById('heightValue');

const currentWeightInput = document.getElementById('currentWeight');
const currentWeightValue = document.getElementById('currentWeightValue');

const weekInput = document.getElementById('week');
const weekValue = document.getElementById('weekValue');

const bmiDisplay = document.getElementById('bmiDisplay');
const bmiCategory = document.getElementById('bmiCategory');
const currentGainDisplay = document.getElementById('currentGain');
const recommendedGainDisplay = document.getElementById('recommendedGain');

let chart;

function getWeightRecommendation(bmi) {
  if (bmi < 18.5) return { min: 12.5, max: 18, category: 'Baixo peso' };
  if (bmi < 25) return { min: 11.5, max: 16, category: 'Normal' };
  if (bmi < 30) return { min: 7, max: 11.5, category: 'Sobrepeso' };
  return { min: 5, max: 9, category: 'Obesidade' };
}

function calculateBMI(weight, height) {
  const heightM = height / 100;
  return weight / (heightM * heightM);
}

function getWeightForWeek(week, preWeight, totalGain) {
  if (week <= 12) {
    return preWeight + (totalGain * 0.05 * (week / 12));
  } else if (week <= 28) {
    const afterFirst = preWeight + (totalGain * 0.05);
    const gainToAdd = totalGain * 0.55 * ((week - 12) / 16);
    return afterFirst + gainToAdd;
  } else {
    const afterSecond = preWeight + (totalGain * 0.6);
    const gainToAdd = totalGain * 0.4 * ((week - 28) / 12);
    return afterSecond + gainToAdd;
  }
}

function updateChart() {
  const preWeight = parseFloat(preWeightInput.value);
  const height = parseFloat(heightInput.value);
  const week = parseInt(weekInput.value);
  const currentWeight = parseFloat(currentWeightInput.value);
  
  preWeightValue.textContent = preWeight.toFixed(1);
  heightValue.textContent = height.toFixed(0);
  currentWeightValue.textContent = currentWeight.toFixed(1);
  weekValue.textContent = week.toFixed(0);
  
  const bmi = calculateBMI(preWeight, height);
  const rec = getWeightRecommendation(bmi);
  
  bmiDisplay.textContent = bmi.toFixed(1);
  bmiCategory.textContent = rec.category;
  
  const avgGain = (rec.min + rec.max) / 2;
  const currentGain = currentWeight - preWeight;
  
  currentGainDisplay.textContent = currentGain.toFixed(1);
  recommendedGainDisplay.textContent = rec.min.toFixed(1) + '-' + rec.max.toFixed(1);
  
  const weeks = Array.from({length: 41}, (_, i) => i);
  const minCurve = weeks.map(w => getWeightForWeek(w, preWeight, rec.min));
  const maxCurve = weeks.map(w => getWeightForWeek(w, preWeight, rec.max));
  const avgCurve = weeks.map(w => getWeightForWeek(w, preWeight, avgGain));
  
  if (chart) {
    chart.data.datasets[0].data = minCurve;
    chart.data.datasets[1].data = maxCurve;
    chart.data.datasets[2].data = avgCurve;
    chart.data.datasets[3].data = weeks.map((w, i) => i === week ? currentWeight : null);
    chart.update();
  } else {
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    chart = new Chart(document.getElementById('weightChart'), {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          {
            label: 'Mín.',
            data: minCurve,
            borderColor: '#199e70',
            backgroundColor: 'rgba(25, 158, 112, 0.08)',
            borderWidth: 1,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 3
          },
          {
            label: 'Máx.',
            data: maxCurve,
            borderColor: '#199e70',
            backgroundColor: 'rgba(25, 158, 112, 0.08)',
            borderWidth: 1,
            fill: '-1',
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 3
          },
          {
            label: 'Esperado',
            data: avgCurve,
            borderColor: '#3987e5',
            backgroundColor: 'rgba(57, 135, 229, 0.1)',
            borderWidth: 2,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 5
          },
          {
            label: 'Atual',
            data: weeks.map((w, i) => i === week ? currentWeight : null),
            borderColor: '#d95926',
            backgroundColor: '#d95926',
            pointRadius: 6,
            pointBorderWidth: 2,
            pointBorderColor: isDark ? '#1a1a19' : '#ffffff',
            showLine: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              usePointStyle: true,
              padding: 12,
              font: { size: 13 },
              color: 'var(--text-secondary)',
              boxWidth: 6,
              boxHeight: 6
            }
          },
          tooltip: {
            backgroundColor: 'rgba(0, 0, 0, 0.85)',
            titleColor: '#fff',
            bodyColor: '#fff',
            padding: 8,
            titleFont: { size: 14 },
            bodyFont: { size: 13 },
            displayColors: true,
            callbacks: {
              label: function(context) {
                return context.dataset.label + ': ' + (context.parsed.y ? context.parsed.y.toFixed(1) : '—') + ' kg';
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: false,
            ticks: {
              color: 'var(--text-muted)',
              font: { size: 13 },
              callback: function(value) {
                return value.toFixed(0) + ' kg';
              }
            },
            grid: {
              color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)',
              drawBorder: false
            }
          },
          x: {
            ticks: {
              color: 'var(--text-muted)',
              font: { size: 12 },
              maxTicksLimit: 10,
              callback: function(value) {
                return value === 0 ? '0' : 'S' + value;
              }
            },
            grid: {
              display: false,
              drawBorder: false
            }
          }
        }
      }
    });
  }
}

preWeightInput.addEventListener('input', updateChart);
heightInput.addEventListener('input', updateChart);
currentWeightInput.addEventListener('input', updateChart);
weekInput.addEventListener('input', updateChart);

updateChart();
</script>
