
<div style="padding: 1rem 0;">
  <h2 class="sr-only">Curva de peso da gravidez interativa</h2>
  
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem;">
    <div>
      <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">Peso pré-gravidez (kg)</label>
      <input type="number" id="preWeight" value="64" min="30" max="200" step="0.5" style="width: 100%;">
    </div>
    <div>
      <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">Altura (cm)</label>
      <input type="number" id="height" value="160" min="140" max="220" step="1" style="width: 100%;">
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem;">
    <div>
      <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">Semana atual</label>
      <div style="display: flex; gap: 8px; align-items: center;">
        <input type="range" id="week" value="20" min="0" max="40" style="flex: 1;">
        <span id="weekDisplay" style="font-weight: 500; min-width: 32px;">20</span>
      </div>
    </div>
    <div>
      <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">IMC pré-gravidez</label>
      <div style="background: var(--surface-1); border-radius: var(--radius); padding: 12px; font-weight: 500; color: var(--text-primary);" id="bmiDisplay">25.0 (Normal)</div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.5rem;">
    <div>
      <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">Peso atual (kg)</label>
      <input type="number" id="currentWeight" value="72" min="30" max="200" step="0.1" style="width: 100%;">
    </div>
    <div style="background: var(--surface-1); border-radius: var(--radius); padding: 1rem;">
      <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 4px;">Ganho até agora</p>
      <p style="font-size: 20px; font-weight: 500; color: var(--text-primary); margin: 0;" id="currentGain">8.0 kg</p>
    </div>
    <div style="background: var(--surface-1); border-radius: var(--radius); padding: 1rem;">
      <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 4px;">Ganho recomendado</p>
      <p style="font-size: 20px; font-weight: 500; color: var(--text-primary); margin: 0;" id="recommendedGain">11.5-16 kg</p>
    </div>
  </div>

  <div style="position: relative; width: 100%; height: 350px; margin-bottom: 1rem;">
    <canvas id="weightChart" role="img" aria-label="Gráfico da curva de peso durante a gravidez"></canvas>
  </div>

  <div style="background: var(--surface-1); border-radius: var(--radius); padding: 1rem; font-size: 13px; color: var(--text-secondary);">
    <p style="margin: 0 0 8px; font-weight: 500; color: var(--text-primary);">Notas:</p>
    <p style="margin: 0;">O ganho de peso esperado depende do IMC pré-gravidez. A curva mostra uma distribuição gradual ao longo das 40 semanas, com maior ganho no 2º e 3º trimestres.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const preWeightInput = document.getElementById('preWeight');
const heightInput = document.getElementById('height');
const weekInput = document.getElementById('week');
const weekDisplay = document.getElementById('weekDisplay');
const bmiDisplay = document.getElementById('bmiDisplay');
const currentWeightInput = document.getElementById('currentWeight');
const currentGainDisplay = document.getElementById('currentGain');
const recommendedGainDisplay = document.getElementById('recommendedGain');

let chart;

function getWeightRecommendation(bmi) {
  if (bmi < 18.5) return { min: 12.5, max: 18, category: 'Baixo peso' };
  if (bmi < 25) return { min: 11.5, max: 16, category: 'Normal' };
  if (bmi < 30) return { min: 7, max: 11.5, category: 'Sobrepeso' };
  return { min: 5, max: 9, category: 'Obesidade' };
}

function calculateBMI(weight, height) {
  const heightM = height / 100;
  return weight / (heightM * heightM);
}

function getWeightForWeek(week, preWeight, totalGain) {
  if (week <= 12) {
    return preWeight + (totalGain * 0.05 * (week / 12));
  } else if (week <= 28) {
    const afterFirst = preWeight + (totalGain * 0.05);
    const gainToAdd = totalGain * 0.55 * ((week - 12) / 16);
    return afterFirst + gainToAdd;
  } else {
    const afterSecond = preWeight + (totalGain * 0.6);
    const gainToAdd = totalGain * 0.4 * ((week - 28) / 12);
    return afterSecond + gainToAdd;
  }
}

function updateChart() {
  const preWeight = parseFloat(preWeightInput.value);
  const height = parseFloat(heightInput.value);
  const week = parseInt(weekInput.value);
  const currentWeight = parseFloat(currentWeightInput.value);
  
  const bmi = calculateBMI(preWeight, height);
  const rec = getWeightRecommendation(bmi);
  
  weekDisplay.textContent = week;
  bmiDisplay.textContent = bmi.toFixed(1) + ' (' + rec.category + ')';
  
  const avgGain = (rec.min + rec.max) / 2;
  const currentGain = currentWeight - preWeight;
  
  currentGainDisplay.textContent = currentGain.toFixed(1) + ' kg';
  recommendedGainDisplay.textContent = rec.min.toFixed(1) + '-' + rec.max.toFixed(1) + ' kg';
  
  const weeks = Array.from({length: 41}, (_, i) => i);
  const minCurve = weeks.map(w => getWeightForWeek(w, preWeight, rec.min));
  const maxCurve = weeks.map(w => getWeightForWeek(w, preWeight, rec.max));
  const avgCurve = weeks.map(w => getWeightForWeek(w, preWeight, avgGain));
  
  if (chart) {
    chart.data.datasets[0].data = minCurve;
    chart.data.datasets[1].data = maxCurve;
    chart.data.datasets[2].data = avgCurve;
    chart.data.datasets[3].data = weeks.map((w, i) => i === week ? currentWeight : null);
    chart.update();
  } else {
    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    chart = new Chart(document.getElementById('weightChart'), {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          {
            label: 'Limite mínimo',
            data: minCurve,
            borderColor: '#199e70',
            backgroundColor: 'rgba(25, 158, 112, 0.05)',
            borderWidth: 1.5,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4
          },
          {
            label: 'Limite máximo',
            data: maxCurve,
            borderColor: '#199e70',
            backgroundColor: 'rgba(25, 158, 112, 0.05)',
            borderWidth: 1.5,
            fill: '-1',
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4
          },
          {
            label: 'Peso esperado',
            data: avgCurve,
            borderColor: '#3987e5',
            backgroundColor: 'rgba(57, 135, 229, 0.08)',
            borderWidth: 2.5,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 6
          },
          {
            label: 'Peso atual',
            data: weeks.map((w, i) => i === week ? currentWeight : null),
            borderColor: '#d95926',
            backgroundColor: '#d95926',
            pointRadius: 8,
            pointBorderWidth: 2,
            pointBorderColor: isDark ? '#1a1a19' : '#ffffff',
            showLine: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              usePointStyle: true,
              padding: 16,
              font: { size: 12 },
              color: 'var(--text-secondary)'
            }
          },
          tooltip: {
            backgroundColor: 'rgba(0, 0, 0, 0.8)',
            titleColor: '#fff',
            bodyColor: '#fff',
            padding: 12,
            displayColors: true,
            callbacks: {
              label: function(context) {
                return context.dataset.label + ': ' + (context.parsed.y ? context.parsed.y.toFixed(1) : '—') + ' kg';
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: false,
            ticks: {
              color: 'var(--text-muted)',
              callback: function(value) {
                return value.toFixed(0) + ' kg';
              }
            },
            grid: {
              color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)',
              drawBorder: false
            }
          },
          x: {
            ticks: {
              color: 'var(--text-muted)',
              callback: function(value) {
                return 'S' + value;
              }
            },
            grid: {
              display: false,
              drawBorder: false
            }
          }
        }
      }
    });
  }
}

preWeightInput.addEventListener('input', updateChart);
heightInput.addEventListener('input', updateChart);
weekInput.addEventListener('input', () => {
  weekDisplay.textContent = weekInput.value;
  updateChart();
});
currentWeightInput.addEventListener('input', updateChart);

updateChart();
</script>
